<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f111a">
  <title>Omni-AI Hub Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f111a;
      color: #f8fafc;
      font-family: Inter, system-ui, sans-serif;
    }
    main {
      width: min(420px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Omni-AI Hub is offline</h1>
    <p>The app shell is cached, but this request needs a network connection. Reconnect and try again.</p>
  </main>
</body>
</html>
